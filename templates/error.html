{% extends "layout.html" %}

{% block title %}Error {{ error_code }} - {{ app_name }}{% endblock %}

{% block content %}
<section class="error-section">
  <div class="container">
    <div class="glass-card error-card text-center mx-auto">
      <div class="error-icon">
        <i class="bi bi-exclamation-octagon-fill"></i>
      </div>
      <h1 class="error-code">{{ error_code }}</h1>
      <h3>{{ error_title }}</h3>
      <p class="text-muted">{{ error_message }}</p>
      <a href="{{ url_for('index') }}" class="btn btn-gradient btn-lg mt-3">
        <i class="bi bi-house-fill me-2"></i>Back to Home
      </a>
    </div>
  </div>
</section>
{% endblock %}
